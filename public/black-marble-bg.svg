<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="baseBlack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#241811"/>
      <stop offset="50%" stop-color="#1a120c"/>
      <stop offset="100%" stop-color="#120c08"/>
    </linearGradient>

    <radialGradient id="sheenDark" cx="30%" cy="15%" r="90%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <filter id="marbleVeinsDark" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="turbulence" baseFrequency="0.004 0.02" numOctaves="4" seed="9" result="baseNoise"/>
      <feDisplacementMap in="SourceGraphic" in2="baseNoise" scale="120" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <linearGradient id="veinStrokeLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8d4c4"/>
      <stop offset="100%" stop-color="#a2816e"/>
    </linearGradient>
  </defs>

  <!-- Base warm brown marble surface -->
  <rect width="1600" height="1000" fill="url(#baseBlack)"/>

  <!-- Diagonal vein network, camel/cream on warm brown -->
  <g filter="url(#marbleVeinsDark)" opacity="0.9">
    <g stroke="url(#veinStrokeLight)" fill="none" stroke-linecap="round">
      <path d="M -50,900 C 200,750 350,650 500,500 C 650,350 750,250 950,50" stroke-width="2.6" opacity="0.75"/>
      <path d="M 0,950 C 180,800 300,700 420,560 C 560,400 700,280 880,80" stroke-width="1.3" opacity="0.55"/>
      <path d="M 100,1000 C 300,820 460,680 600,520 C 760,340 900,220 1100,40" stroke-width="2" opacity="0.7"/>
      <path d="M 300,1000 C 450,850 560,720 700,560 C 850,400 980,280 1180,80" stroke-width="1" opacity="0.5"/>
      <path d="M 500,1000 C 650,860 780,720 900,580 C 1050,410 1180,280 1380,90" stroke-width="2.4" opacity="0.7"/>
      <path d="M 650,1000 C 800,850 920,720 1050,580 C 1200,420 1330,280 1550,90" stroke-width="1.1" opacity="0.5"/>
      <path d="M 850,1000 C 1000,860 1120,730 1250,590 C 1380,440 1480,320 1650,140" stroke-width="1.6" opacity="0.6"/>
      <path d="M 1050,1000 C 1180,870 1300,750 1420,610 C 1520,480 1600,380 1700,260" stroke-width="1.2" opacity="0.5"/>
      <path d="M -80,600 C 100,560 220,520 380,470 C 550,420 700,380 900,340" stroke-width="0.8" opacity="0.35"/>
      <path d="M -50,300 C 150,280 320,260 500,230 C 700,200 880,170 1100,130" stroke-width="0.7" opacity="0.3"/>
      <path d="M 200,50 C 350,150 480,260 600,380 C 720,500 800,600 900,720" stroke-width="0.9" opacity="0.4"/>
      <path d="M 1200,950 C 1300,820 1400,700 1480,580 C 1550,470 1600,380 1650,280" stroke-width="1.4" opacity="0.55"/>
    </g>
  </g>

  <!-- Fine hairline cracks for extra realism -->
  <g filter="url(#marbleVeinsDark)" opacity="0.6">
    <g stroke="#8a7365" fill="none" stroke-linecap="round">
      <path d="M 50,850 C 220,760 360,660 520,530" stroke-width="0.5"/>
      <path d="M 700,900 C 850,760 980,650 1150,500" stroke-width="0.5"/>
      <path d="M 1300,850 C 1420,740 1520,640 1600,540" stroke-width="0.5"/>
    </g>
  </g>

  <!-- Subtle glossy polish -->
  <rect width="1600" height="1000" fill="url(#sheenDark)"/>
</svg>
